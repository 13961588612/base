# OpenHarness 公司后端 · 本地开发依赖
# 用法：cd openharness && docker compose up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: openharness-postgres
    restart: unless-stopped
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: harness
      POSTGRES_PASSWORD: harness
      POSTGRES_DB: harness_dev
    volumes:
      - openharness_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U harness -d harness_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  openharness_pg_data:
